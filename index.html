<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThinkClear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>ThinkClear</h1>

  <!-- Step 1 -->
  <div class="section">
    <h2>Decision</h2>
    <input type="text" id="decision" placeholder="What decision are you trying to make?">
  </div>

  <!-- Step 2 -->
  <div class="section">
    <h2>Options</h2>
    <div id="optionsContainer"></div>
    <button onclick="addOption()">+ Add Option</button>
  </div>

  <!-- Step 3 -->
  <div class="section">
    <h2>Reflection</h2>
    <textarea id="reflection" placeholder="What are you leaning towards and why?"></textarea>
  </div>

  <!-- Step 4 -->
  <div class="section">
    <button id="aiBtn">Get AI Suggestion</button>
    <div id="result"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThinkClear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header class="header">
    <div>
      <p class="app-name">ThinkClear</p>
      <h1>Decisions</h1>
    </div>
    <button id="newDecisionBtn">+ New Decision</button>
  </header>

  <div class="section">
    <h2>Your decisions</h2>
    <div id="decisionList" class="decision-list"></div>
    <div id="emptyState" class="empty-state">No decisions yet. Click "New Decision" to start.</div>
  </div>

  <!-- New Decision Modal -->
  <div id="newDecisionModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <h3>Name your decision</h3>
      <p class="muted">Give this decision a short title so you can find it later.</p>
      <input id="newDecisionInput" type="text" placeholder="e.g. Should I change jobs?" autocomplete="off">
      <div class="modal-actions">
        <button id="cancelNewDecision" class="ghost">Cancel</button>
        <button id="confirmNewDecision">Create</button>
      </div>
      <p id="newDecisionError" class="error-text" role="alert"></p>
    </div>
  </div>

  <!-- Delete Decision Modal -->
  <div id="deleteDecisionModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <h3>Delete this decision?</h3>
      <p class="muted" id="deleteDecisionTitle"></p>
      <div class="modal-actions">
        <button id="cancelDeleteDecision" class="ghost">Cancel</button>
        <button id="confirmDeleteDecision" class="danger">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

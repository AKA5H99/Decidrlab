<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThinkClear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header class="header">
    <div>
      <p class="app-name">ThinkClear</p>
      <h1>Decisions</h1>
    </div>
    <button id="newDecisionBtn">+ New Decision</button>
  </header>

  <div class="section">
    <h2>Your decisions</h2>
    <div id="decisionList" class="decision-list"></div>
    <div id="emptyState" class="empty-state">No decisions yet. Click "New Decision" to start.</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

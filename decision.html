<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThinkClear | Decision</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="top-bar">
    <button id="backBtn" class="ghost">&#8592; Back</button>
    <div class="title-stack">
      <p class="app-name">ThinkClear</p>
      <h1>Decision</h1>
      <p class="muted" id="lastSaved">Not saved yet</p>
    </div>
    <button id="saveBtn">Save</button>
  </div>

  <div class="section">
    <h2>Decision</h2>
    <input type="text" id="decision" placeholder="What decision are you trying to make?">
  </div>

  <div class="section">
    <h2>Options</h2>
    <div id="optionsContainer"></div>
    <button id="addOptionBtn" type="button">+ Add Option</button>
  </div>

  <div class="section">
    <h2>Reflection</h2>
    <textarea id="reflection" placeholder="What are you leaning towards and why?"></textarea>
  </div>

  <div class="section">
    <div class="button-row">
      <button id="aiBtn" type="button">Get AI Suggestion</button>
      <span id="saveStatus" class="muted"></span>
    </div>
    <div id="result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

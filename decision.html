<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decidrlab | Decision</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="top-bar">
    <button id="backBtn" class="ghost">&#8592; Back</button>
    <div class="title-stack">
      <p class="app-name">Decidrlab</p>
      <h1>Decision</h1>
      <p class="muted" id="lastSaved">Not saved yet</p>
    </div>
    <div class="top-bar-spacer"></div>
  </div>

  <div class="section decision-card">
    <p class="card-label">Your Decision</p>
    <textarea id="decision" class="decision-input" rows="2" placeholder="What decision are you trying to make?"></textarea>
  </div>

  <div class="section">
    <h2>Options</h2>
    <div id="optionsContainer"></div>
    <button id="addOptionBtn" type="button">+ Add Option</button>
  </div>

  <div class="section">
    <h2>Summary</h2>
    <p class="muted">Summary of all your Choices and its pros and cons.</p>
    <h3 id="summaryDecisionTitle" class="summary-decision-title">Decision will appear here</h3>
    <div id="summaryChoices" class="summary-choices">
      <p class="muted">Nothing to show yet.</p>
    </div>
    <button id="downloadSummaryBtn" type="button" class="ghost">Download Summary</button>
  </div>

  <div class="section">
    <h2>Final Decision</h2>
    <textarea id="reflection" placeholder="What is your Final Decision and why?"></textarea>
  </div>

  <div class="section">
    <div class="button-row">
      <button id="aiBtn" type="button">Get AI Suggestion</button>
      <span id="saveStatus" class="muted"></span>
    </div>
    <div id="result"></div>
  </div>
</div>

<!-- New Option Modal -->
<div id="newOptionModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal">
    <h3>Name this option</h3>
    <p class="muted">Add a short title so you can spot it in the summary.</p>
    <input id="newOptionInput" type="text" placeholder="e.g. Work remotely" autocomplete="off">
    <div class="modal-actions">
      <button id="cancelNewOption" class="ghost">Cancel</button>
      <button id="confirmNewOption">Add</button>
    </div>
    <p id="newOptionError" class="error-text" role="alert"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
